<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هەستیار ڕزگار - Hastyar Rizgar</title>
    <style>
        :root {
            --primary: #d32f2f;
            --dark: #0f172a;
            --text: #334155;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            margin: 20px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
            color: var(--dark);
            font-size: 1.8rem;
        }

        .bio {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #64748b;
        }

        .search-box {
            background: #fff5f5;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--primary);
            margin-top: 20px;
        }

        .search-box h3 {
            color: var(--primary);
            margin-top: 0;
            font-size: 1.2rem;
        }

        .username-tag {
            background: var(--primary);
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 8px;
            display: inline-block;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* هێماکانی سۆشیاڵ میدیا بۆ جوانی */
        .social-icons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="img.png" alt="Hastyar Rizgar" class="profile-img">
    
    <h1>هەستیار ڕزگار</h1>
    <p class="bio">
        ڤیدیۆگرافەر و مۆنتێر | خاوەنی پڕۆژەی <strong>"پێنجوێن شاری فێربوون"</strong> <br>
        نووسەری زیاتر لە ٦٠ هۆنراوە
    </p>

    <div class="search-box">
        <h3>🔍 سێرچم بکەن</h3>
        <p>بۆ بینینی ڤیدیۆکان و کارەکانم لە یوتیووب و فەیسبووک، گەڕان بکە بۆ:</p>
        <div class="username-tag">Hastyar Rizgar</div>
        <div class="social-icons">
            <span style="color: #ff0000;">YouTube</span>
            <span style="color: #1877f2;">Facebook</span>
        </div>
    </div>

    <div class="footer">
        © 2026 هەستیار ڕزگار - هەموو مافەکان پارێزراوە
    </div>
</div>

</body>
</html>
